name: Backend CI

on:
  push:
    branches:
      - "*"        # 所有 branch 都跑 CI
  pull_request:
    branches:
      - master     # PR 到 master 才算正式檢查

jobs:
  backend-check:
    name: Check Backend
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: test_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      DATABASE_URL: sqlite:///./test.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m compileall app

      - name: Check FastAPI app import
        run: python -c "from app.main import app; print('Backend import OK')"

  docker-build:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t teamflow-backend:test .

  docker-push:
    name: Push Backend Docker Image
    runs-on: ubuntu-latest
    needs: docker-build

    # 只在 master 才 push
    if: github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build -t ghcr.io/fad1765/teamflow-backend:latest .
          docker push ghcr.io/fad1765/teamflow-backend:latest